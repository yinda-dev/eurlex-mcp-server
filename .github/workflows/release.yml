name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run checks
        run: pnpm run check

      - name: Build
        run: pnpm run build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Publish to npm
        run: pnpm publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  deploy-lightsail:
    name: Deploy to Lightsail
    needs: release
    runs-on: ubuntu-latest
    env:
      AWS_REGION: eu-central-1
      SERVICE_NAME: eurlex-mcp

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Lightsail plugin
        run: |
          curl -s "https://s3.us-west-2.amazonaws.com/lightsailctl/latest/linux-amd64/lightsailctl" \
            -o /usr/local/bin/lightsailctl && chmod +x /usr/local/bin/lightsailctl

      - name: Build and push image
        run: |
          docker build --platform linux/amd64 -t $SERVICE_NAME .
          aws lightsail push-container-image \
            --service-name $SERVICE_NAME \
            --label $SERVICE_NAME \
            --image $SERVICE_NAME:latest \
            --region $AWS_REGION 2>&1 | tee push-output.txt

      - name: Deploy
        run: |
          IMAGE=$(sed -n 's/.*"\(:[^"]*\)".*/\1/p' push-output.txt)
          if [ -z "$IMAGE" ]; then
            echo "Failed to parse image name from push output"
            exit 1
          fi
          aws lightsail create-container-service-deployment \
            --service-name $SERVICE_NAME \
            --region $AWS_REGION \
            --containers "{
              \"$SERVICE_NAME\": {
                \"image\": \"$IMAGE\",
                \"ports\": {\"3001\": \"HTTP\"},
                \"environment\": {}
              }
            }" \
            --public-endpoint "{
              \"containerName\": \"$SERVICE_NAME\",
              \"containerPort\": 3001,
              \"healthCheck\": {\"path\": \"/health\", \"intervalSeconds\": 30}
            }"
